model:
  name: vit_base_patch16
  num_classes: 12
  pretrained: true

training:
  batch_size: 16
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 10

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  image_size: 512
  num_workers: 4

optimizer:
  type: adamw
  lr: 0.0001
  weight_decay: 0.0001
